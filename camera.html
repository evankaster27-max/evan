<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程拍摄系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 100%;
            min-height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 主界面 - 确保可滚动 */
        .main-page {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 24px; 
            font-size: 22px; 
        }
        
        .form-group { 
            margin-bottom: 16px; 
        }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: #555; 
            font-weight: 500; 
            font-size: 14px; 
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success { 
            background: #28a745; 
            color: white; 
        }
        
        .link-box {
            margin-top: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
        
        .link-box a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
        }
        
        #copyBtn, #copyAliasBtn { 
            display: none; 
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }
        
        .alias-box {
            margin-top: 10px;
            padding: 10px;
            background: #e8f4fd;
            border-radius: 6px;
            display: none;
        }

        /* 拍摄界面 */
        .capture-page {
            display: none;
            background: #1a1a2e;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            color: white;
        }
        
        .capture-page h2 { 
            font-size: 22px; 
            margin-bottom: 20px; 
        }
        
        #video {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin-bottom: 20px;
            transform: scaleX(-1);
        }
        
        #canvas { 
            display: none; 
        }
        
        .status { 
            font-size: 16px; 
            margin: 20px 0; 
        }
        
        .btn-allow {
            background: #667eea;
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .warning-box {
            background: rgba(255,200,0,0.2);
            border: 1px solid #ffc800;
            border-radius: 8px;
            padding: 12px;
            margin: 15px auto;
            color: #ffc800;
            max-width: 400px;
            display: none;
        }
        
        #previewImg {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin: 15px auto;
            display: none;
        }
        
        .share-btns { 
            display: none; 
            margin-top: 20px; 
        }
